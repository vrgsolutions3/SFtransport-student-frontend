name: Sync fork on push

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to fork
        run: |
          git remote add fork https://x-access-token:${{ secrets.FORK_SYNC_TOKEN }}@github.com/vrgsolutions3/SFtransport-student-frontend.git
          git push fork main
